version: "3.9"

services:
  bot:
    build: .
    container_name: uptimebot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./sessions:/app/sessions  # persist Pyrogram session files

  mongo:
    image: mongo:7
    container_name: uptimebot_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: uptimebot
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
